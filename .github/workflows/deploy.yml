name: Deployment with terraform and aws
on:
  push:
    branches:
      - main

env:
  AWS_ACCESS_KEY_ID = ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_ACCESS_SECRET_KEY = ${{ secrets.AWS_ACCESS_SECRET_KEY }}
  AWS_TF_STATE_BUCKET_NAME = ${{ secrets. }}
  AWS_SSH_KEY_PRIVATE = ${{ secrets.AWS_TF_STATE_BUCKET_NAME }}
  AWS_SSH_KEY_PUBLIC = ${{ secrets.AWS_SSH_KEY_PUBLIC }}
  AWS_REGION = "eu-north-1"

jobs:
  deploy infra:
    runs-on : "ubuntu-latest"
    steps:
      - name : Checkout Repo
        uses : actions/checkout@v4
      - name : Setup terraform
        uses : hashicorp/setup-terraform@v3
        with : 
          terraform_wrapper : false
      - name : Terraform init
        id: init
        run : terraform init -backend-config="bucket=$AWS_TF_STATE_BUCKET_NAME" -backend-config="region=$AWS_REGION"
        working-directory : ./terraform
      - name : Terraform plan
        run : |
          terraform-pan \
          -var="region=$AWS_REGION" \
          -var="public_key=AWS_SSH_KEY_PUBLIC" \
          -var="private_key=AWS_SSH_KEY_PRIVATE" \
          -out=PLAN
        working_directory: ./terraform
      - name: Terraform apply
        id: apply
        run: terraform apply PLAN
        working- directory: ./terraform