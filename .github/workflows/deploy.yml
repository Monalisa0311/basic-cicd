name: Deployment with terraform and aws
on:
  push:
    branches:
      - main

env:
  AWS_ACCESS_KEY_ID : ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY : ${{ secrets.AWS_ACCESS_SECRET_KEY }}
  AWS_TF_STATE_BUCKET_NAME : ${{ secrets.AWS_TF_STATE_BUCKET_NAME }}
  AWS_SSH_KEY_PRIVATE : ${{ secrets.AWS_SSH_KEY_PRIVATE }}
  AWS_SSH_KEY_PUBLIC : ${{ secrets.AWS_SSH_KEY_PUBLIC }}
  AWS_REGION : "eu-north-1"

jobs:
  deploy_infra:
    runs-on : "ubuntu-latest"
    outputs:
      SERVER_PUBLIC_IP: ${{steps.set-ip.outputs.instance_public_ip}}
    steps:
      - name : Checkout Repo
        uses : actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name : Setup terraform
        uses : hashicorp/setup-terraform@v3
        with : 
          terraform_wrapper : false
      - name : Terraform init
        id: init
        run : terraform init -backend-config="bucket=$AWS_TF_STATE_BUCKET_NAME" -backend-config="region=$AWS_REGION"
        working-directory : ./terraform
      - name : Terraform plan
        run : |
          terraform plan \
          -var="region=$AWS_REGION" \
          -var="public_key=$AWS_SSH_KEY_PUBLIC" \
          -var="private_key=$AWS_SSH_KEY_PRIVATE" \
          -var="key_name=deployer-key" \
          -out=PLAN
        working-directory: ./terraform
      - name: Terraform apply
        id: apply
        run: terraform apply PLAN
        working-directory: ./terraform
      - name: set outputs
        id: set-ip
        run: echo "::set-output name=instance_public_ip::$(terraform output instance_public_ip)"
        working-directory: ./terraform
  deploy-app:
    runs-on: ubuntu-latest
    needs: deploy_infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: set ip to env
        run: echo SERVER_PUBLIC_IP=${{needs.deploy_infra.outputs.SERVER_PUBLIC_IP}}>> $GITHUB_ENV
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, push docker img
        env:
          REGISTRY: ${{steps.login-ecr.outputs.registry}}
          REPOSITORY: example-node-app
          IMAGE_TAG: ${{github.sha}}
        run: |-
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG ./nodeapp
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
      - name: Deploy docker image to EC2
        env:
          REGISTRY: ${{steps.login-ecr.outputs.registry}}
          REPOSITORY: example-node-app
          IMAGE_TAG: ${{github.sha}}
          AWS_DEFAULT_REGION: ${{env.AWS_REGION}}
        uses: appleboy/ssh-action@master
        with:
          host: ${{env.SERVER_PUBLIC_IP}}
          username: ec2-user
          key: ${{env.AWS_SSH_KEY_PRIVATE}}
          envs: AWS_SSH_KEY_PRIVATE, REPOSITORY, REGISTRY, IMAGE_TAG, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,AWS_REGION, AWS_DEFAULT_REGION
          script: |-
            sudo yum update -y
            sudo yum install docker -y
            sudo yum install aws-cli -y
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user
            aws ecr get-login-password --region eu-north-1 | sudo docker login --username AWS --password-stdin $REGISTRY
            sudo docker stop mycontainer|| true
            sudo docker rm mycontainer|| true
            sudo docker pull $REGISTRY/$REPOSITORY:$IMAGE_TAG
            sudo docker run -d --name mycontainer -p 80:8000 $REGISTRY/$REPOSITORY:$IMAGE_TAG

